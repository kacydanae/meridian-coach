function natalAspects(n){
  const abs=p=>{const i=SIGNS.indexOf(p.sign);return (i<0?0:i*30)+(parseFloat(p.deg)||0);};
  const ks=Object.keys(n.planets).filter(k=>k!=='ascendant'&&k!=='midheaven');
  const A={conjunction:0,sextile:60,square:90,trine:120,opposition:180},ORB={conjunction:8,sextile:5,square:7,trine:7,opposition:8},out=[];
  for(let i=0;i<ks.length;i++)for(let j=i+1;j<ks.length;j++){let d=Math.abs(abs(n.planets[ks[i]])-abs(n.planets[ks[j]]))%360;if(d>180)d=360-d;
    for(const an in A){if(Math.abs(d-A[an])<=ORB[an]){out.push({a:ks[i],b:ks[j],aspect:an,orb:+Math.abs(d-A[an]).toFixed(1)});break;}}}
  return out.sort((x,y)=>x.orb-y.orb);
}

  const hl=(t.hits||[]).map(h=>{const d=D(h),now=within(d,T,1);return `<b class="${now?'now':''}">${fmt(d)}${now?' Â· now':''}</b>`;}).join(' &nbsp;Â·&nbsp; ');
  return `<div class="tl"><div class="tlhead"><span class="tllab">Trigger window Â· exact hits</span><span class="ti">${ticks(t.intensity)}</span></div>

function openTransitSheet(c,tk){
  const [p,a,pt]=tk.split('|');
  const t=(J(c.long_term_transits_json)||[]).find(x=>x.planet===p&&x.aspect===a&&x.point===pt);
  const ex=J(c.chart_extras_json)||{};
  const n=J(c.natal_json)||{};
  const trigs=(J(c.daily_triggered_json)?.triggers||[]).filter(x=>x.tkey===tk);
  const trigNow=trigs.find(x=>x.date===todayISO);
  let move='';
  const nh=n.planets?.[pt]?.house||({ascendant:1,midheaven:10,ic:4,descendant:7}[pt]);
  if(SKYPOS&&SKYPOS[p]&&ex.houses&&ex.houses.length){const th=houseOfLonJS(SKYPOS[p].abs_pos,ex.houses);
    move=`<div class="baserow" style="margin-top:10px;"><div class="bl">The movement</div><div class="bv"><b>${pl(p)}</b> is moving through her ${ord(th)} <span class="mut">â€” ${HMs[th]}</span><br>hitting natal <b>${ptName(pt)}</b>${nh?` in her ${ord(nh)} <span class="mut">â€” ${HMs[nh]}</span>`:''}</div></div>`;}
  const rules=(ex.houses||[]).filter(h=>RUL[h.sign]===pt).map(h=>h.house);
  const pa=(ex.aspects||[]).filter(x=>x.a===pt||x.b===pt).map(x=>`${glyph[x.aspect]||x.aspect} ${ptName(x.a===pt?x.b:x.a)}`);
  const life=(rules.length||pa.length)?`<div style="margin-top:12px;background:var(--paper2);border:1px solid var(--line2);border-radius:6px;padding:12px 14px;">
    <div class="clab"><span class="ico">âˆž</span> Lifetime pattern â€” what this transit presses on</div>
    <div class="small" style="margin-top:7px;line-height:1.65;"><b>${ptName(pt)}</b>${rules.length?` rules her <b>${rules.map(ord).join(' & ')}</b> <span class="muted">(${rules.map(h=>HMs[h]).join('; ')})</span>`:''}${nh?`${rules.length?' and':''} sits in her <b>${ord(nh)}</b>`:''}.${pa.length?`<br>Natal wiring: ${pa.join(' &nbsp;Â·&nbsp; ')}.`:''}</div></div>`:'';
  sheet(sheetTop(c.name+' Â· Transit',esc(t?.label||pl(p)+' '+a+' '+ptName(pt)),trigNow?('âš¡ Triggered by '+pl(trigNow.fast)+' today'):'The deep dive â€” themes in Meridian voice')+
    `<div class="sheet-body">${t?timeline(t):''}
    ${move}
    <div id="trigdays" class="small muted" style="margin-top:10px;">Loading trigger daysâ€¦</div>
    ${life}
    <div class="readout" id="ro-trans" style="display:none;"></div></div>`);
  readInto('ro-trans','transit_deep_dive',{client_id:c.id,tkey:tk});
  api('transit_triggers',{client_id:c.id,tkey:tk}).then(r=>{
    const el=document.getElementById('trigdays');if(!el)return;
    const list=r.triggers||[];
    el.innerHTML=list.length?`<span class="lab" style="font-size:8.5px;">Trigger days â€” fast planets striking ${ptName(pt)}</span><div style="margin-top:5px;line-height:2;">`+list.map(x=>{const now=x.date===todayISO;return `<span style="display:inline-block;margin-right:13px;${now?'color:var(--accent);font-weight:bold;':''}">${glyph[x.fast]||''}${glyph[x.aspect]||''} <b>${fmt(D(x.date))}</b>${now?' Â· today':''}</span>`;}).join('')+'</div>'
      :'<span class="muted">No fast-planet trigger days before this transit completes.</span>';
  }).catch(()=>{const el=document.getElementById('trigdays');if(el)el.innerHTML='';});
}

  sheet(sheetTop(c.name,'âœŽ '+titles[rkey]+' location','Where is she for this cycle? The chart recasts there.')+

    <div id="geores"></div><div class="small muted" style="margin-top:10px;">Type the city, hit Search, pick the match â€” the ${rkey==='sr'?'year':'month'} recasts once at those coordinates.</div></div>`);

  const go=async()=>{
    const v=q.value.trim();if(v.length<2)return;
    document.getElementById('geores').innerHTML='<div class="muted small" style="margin-top:8px;">Searchingâ€¦</div>';
    const r=await fetch('https://geocoding-api.open-meteo.com/v1/search?name='+encodeURIComponent(v)+'&count=5&language=en&format=json').then(x=>x.json()).catch(()=>null);
    document.getElementById('geores').innerHTML=(r?.results||[]).map((g,i)=>

  };
  q.onkeydown=e=>{if(e.key==='Enter'){e.preventDefault();go();}};
  setTimeout(()=>{const b=document.getElementById('geogo');if(b)b.onclick=go;},0);

document.addEventListener('click',e=>{
  const chip=e.target.closest('[data-open]');if(chip){openClientI(+chip.dataset.open);return;}
  const tab=e.target.closest('[data-tab]');if(tab){TAB=tab.dataset.tab;renderClient();return;}
  const trig=e.target.closest('.trigitem');if(trig){CUR=DATA[+trig.dataset.ci];TAB='transits';renderClient();show('client');openTransitSheet(CUR,trig.dataset.tk);return;}
  const mt=e.target.closest('.mt');if(mt&&CUR){openTransitSheet(CUR,mt.dataset.tk);return;}
  const pr=e.target.closest('[data-place]');if(pr&&CUR){openPlacementSheet(CUR,pr.dataset.place);return;}
  const pg=e.target.closest('[data-prog]');if(pg&&CUR){openProgSheet(CUR,pg.dataset.prog);return;}
  const rd=e.target.closest('[data-read]');if(rd&&CUR){const k=rd.dataset.read;readInto('ro-'+k,'return_read',{client_id:CUR.id,rkey:k});return;}
  const lc=e.target.closest('[data-loc]');if(lc&&CUR){openLocSheet(CUR,lc.dataset.loc);return;}
  const dr=e.target.closest('[data-draft]');if(dr&&CUR){openDraftSheet(CUR);return;}
  const geo=e.target.closest('[data-geo]');if(geo){recompute(geo.dataset.rk,JSON.parse(geo.dataset.geo));return;}
  if(e.target.id==='fullchart'){openFullChart();return;}
  if(e.target.id==='wksave'&&CUR){saveWork();return;}
  if(e.target.id==='bizsave'&&CUR){saveBiz(collectBiz());return;}
  if(e.target.id==='bizadd'&&CUR){const b=collectBiz();b.rows.push({label:'',value:''});CUR.business_json=b;renderClient();return;}
  if(e.target.id==='linkadd'&&CUR){const b=collectBiz();const l=document.getElementById('linklabel').value.trim();let u=document.getElementById('linkurl').value.trim();if(!l||!u){toast('Label and URL, please');return;}if(!/^https?:\/\//i.test(u))u='https://'+u;b.links.push({label:l,url:u});saveBiz(b);return;}
  const lrm=e.target.closest('[data-lrm]');if(lrm&&CUR){const b=collectBiz();b.links.splice(+lrm.dataset.lrm,1);saveBiz(b);return;}
  const mvb=e.target.closest('[data-mv]');if(mvb&&CUR){const b=collectBiz();const i=+mvb.dataset.bi;const k=mvb.dataset.mv;
    if(k==='rm')b.rows.splice(i,1);
    else if(k==='up'&&i>0){const t=b.rows[i-1];b.rows[i-1]=b.rows[i];b.rows[i]=t;}
    else if(k==='dn'&&i<b.rows.length-1){const t=b.rows[i+1];b.rows[i+1]=b.rows[i];b.rows[i]=t;}
    CUR.business_json=b;renderClient();return;
  }
  if(e.target.id==='chatsend'&&CUR){sendChat();return;}
  if(e.target.id==='overlay')closeSheet();
});

  const ta=document.getElementById('chatin');const q=(ta?.value||'').trim();if(!q)return;ta.value='';
  const {data:log}=await sb.from('coach_chat_messages').select('role,content').eq('client_id',CUR.id).order('created_at',{ascending:true}).limit(80);
  renderChat([...(log||[]),{role:'user',content:q},{role:'assistant',content:'â€¦'}]);
  const r=await api('chat',{client_id:CUR.id,message:q});
  if(r.need_key){renderChat([...(log||[]),{role:'user',content:q},{role:'assistant',content:'Add your Anthropic key in Settings (âš™ï¸Ž) and ask me again.'}]);return;}
  loadChat();
}
